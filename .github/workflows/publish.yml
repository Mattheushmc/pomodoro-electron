name: Publish Release

on:
  workflow_run:
    workflows: ["Build & Release Electron App"]
    types:
      - completed

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.AppImage
            **/*.exe
            **/*.dmg
